<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRITONO | Granada Conecta</title>
    
    <!-- Librerías Externas -->
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <script src="[https://unpkg.com/react@18/umd/react.production.min.js](https://unpkg.com/react@18/umd/react.production.min.js)"></script>
    <script src="[https://unpkg.com/react-dom@18/umd/react-dom.production.min.js](https://unpkg.com/react-dom@18/umd/react-dom.production.min.js)"></script>
    <script src="[https://unpkg.com/@babel/standalone/babel.min.js](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
    <script src="[https://unpkg.com/lucide@latest](https://unpkg.com/lucide@latest)"></script>

    <style>
        @import url('[https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap](https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap)');
        :root { --granate: #4a0404; --amarillo: #facc15; --violeta: #8b5cf6; }
        body { background-color: var(--granate); margin: 0; color: white; font-family: system-ui; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .font-tritono { font-family: 'Archivo Black', sans-serif; }
        .card-shadow { box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24 }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [tab, setTab] = useState('agenda');
            
            const events = [
                { id: 1, title: "Techno Night", venue: "Industrial Copera", date: "15/04", img: "[https://images.unsplash.com/photo-1514525253344-8d13ee7c976d?w=800](https://images.unsplash.com/photo-1514525253344-8d13ee7c976d?w=800)" },
                { id: 2, title: "Indie Rock", venue: "Planta Baja", date: "16/04", img: "[https://images.unsplash.com/photo-1501386761578-eac5c94b800a?w=800](https://images.unsplash.com/photo-1501386761578-eac5c94b800a?w=800)" },
                { id: 3, title: "Flamenco Vivo", venue: "Sacromonte", date: "17/04", img: "[https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?w=800](https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?w=800)" }
            ];

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-[#4a0404]">
                    <header className="pt-14 pb-6 px-8 text-center sticky top-0 bg-[#4a0404]/90 backdrop-blur-md z-50">
                        <h1 className="text-6xl font-tritono italic uppercase leading-[0.8] text-[#facc15]">TRI<br/><span className="text-[#8b5cf6]">TONO</span></h1>
                        <p className="text-[10px] font-tritono uppercase tracking-[0.8em] text-[#8b5cf6] mt-4">Granada</p>
                    </header>

                    <main className="flex-1 p-6 pb-32 space-y-8">
                        {tab === 'agenda' && events.map(ev => (
                            <div key={ev.id} className="relative h-72 rounded-[2.5rem] overflow-hidden border border-white/10 card-shadow">
                                <img src={ev.img} className="w-full h-full object-cover grayscale-[0.3]" />
                                <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent" />
                                <div className="absolute bottom-6 left-6">
                                    <h3 className="text-2xl font-tritono italic uppercase">{ev.title}</h3>
                                    <p className="text-[10px] font-bold uppercase text-[#facc15]">{ev.venue} — {ev.date}</p>
                                </div>
                            </div>
                        ))}
                        {tab !== 'agenda' && (
                            <div className="h-64 flex items-center justify-center italic text-[#8b5cf6]">Próximamente...</div>
                        )}
                    </main>

                    <nav className="fixed bottom-8 left-8 right-8 h-20 bg-black/80 backdrop-blur-xl rounded-[2.2rem] border border-white/10 flex items-center justify-around z-50 shadow-2xl">
                        <button onClick={() => setTab('agenda')} className={`p-4 ${tab === 'agenda' ? 'text-[#facc15]' : 'text-white/20'}`}><Icon name="calendar" /></button>
                        <button onClick={() => setTab('radar')} className={`p-4 ${tab === 'radar' ? 'text-[#facc15]' : 'text-white/20'}`}><Icon name="navigation" /></button>
                        <button onClick={() => setTab('perfil')} className={`p-4 ${tab === 'perfil' ? 'text-[#facc15]' : 'text-white/20'}`}><Icon name="user" /></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
